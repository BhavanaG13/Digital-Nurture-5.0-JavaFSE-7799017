<section class="reactive-enrollment-form">
  <h2>Enrollment Form (Reactive)</h2>

  <form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
    <label>
      Name
      <input formControlName="name" />
      <span class="error" *ngIf="f['name'].invalid && f['name'].touched">Name is required (min 2 characters).</span>
    </label>

    <label>
      Email
      <input formControlName="email" type="email" />
      <span class="error" *ngIf="f['email'].invalid && f['email'].touched">Enter a valid email.</span>
    </label>

    <label>
      Course
      <input formControlName="course" />
      <span class="error" *ngIf="f['course'].invalid && f['course'].touched">Course is required.</span>
    </label>

    <button type="submit">Submit</button>
  </form>

  <p *ngIf="submitted" class="success">Enrollment submitted successfully!</p>
  <p class="hint">Try editing a field then navigating away to see the unsaved-changes guard in action.</p>
</section>
